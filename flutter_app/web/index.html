<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    SafePass Flutter Web
    Base href is replaced at build time by --base-href flag.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SafePass — Real-time AI-driven weather travel advisory for Mumbai. Get live Safeness Scores powered by OpenWeatherMap, ML predictions, and crowdsourced reports.">
  <meta name="theme-color" content="#0A0E1A">

  <!-- PWA / iOS -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SafePass">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">

  <!-- Google Fonts: Inter (UI) + Noto Emoji (fixes "missing characters" warning) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Emoji:wght@400&display=swap" rel="stylesheet">

  <title>SafePass Mumbai — Real-time Travel Advisory</title>

  <style>
    /* Fullscreen dark background while Flutter loads */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #0A0E1A;
      font-family: 'Inter', sans-serif;
    }

    /* Loading splash — hidden once Flutter boots */
    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0A0E1A;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }

    .splash-shield {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: rgba(0,229,255,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      margin-bottom: 20px;
      box-shadow: 0 0 32px rgba(0,229,255,0.25);
      animation: pulse 1.4s ease-in-out infinite;
    }
    .splash-title {
      color: #fff;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .splash-sub {
      color: rgba(255,255,255,0.4);
      font-size: 13px;
    }
    .splash-spinner {
      margin-top: 28px;
      width: 28px;
      height: 28px;
      border: 3px solid rgba(0,229,255,0.15);
      border-top-color: #00E5FF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin  { to { transform: rotate(360deg); } }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 32px rgba(0,229,255,0.25); }
      50%      { box-shadow: 0 0 52px rgba(0,229,255,0.5);  }
    }
  </style>
</head>
<body>
  <!-- Branded splash screen shown while Flutter compiles -->
  <div id="splash">
    <div class="splash-shield">🛡️</div>
    <div class="splash-title">SafePass</div>
    <div class="splash-sub">Mumbai Travel Advisory</div>
    <div class="splash-spinner"></div>
  </div>

  <script>
    // Hide splash once Flutter has rendered its first frame
    window.addEventListener('flutter-first-frame', function () {
      const splash = document.getElementById('splash');
      if (splash) {
        splash.classList.add('hidden');
        setTimeout(() => splash.remove(), 500);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
